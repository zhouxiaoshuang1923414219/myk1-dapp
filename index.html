<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYK 测试面板</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0d0f1a; color: #eaeaea; min-height: 100vh; padding: 16px; display: flex; justify-content: center; }
        .c { max-width: 680px; width: 100%; }
        h1 { text-align: center; color: #f0a500; font-size: 20px; margin-bottom: 4px; }
        .sub { text-align: center; color: #888; font-size: 11px; margin-bottom: 12px; }
        .card { background: rgba(22,33,62,0.85); border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.06); }
        .card h2 { font-size: 13px; color: #4ecca3; margin-bottom: 6px; }
        input { width: 100%; padding: 9px; border: 1px solid #2a2f52; border-radius: 8px; background: #0f1422; color: #fff; font-size: 13px; margin-bottom: 5px; }
        button { width: 100%; padding: 10px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 4px; }
        button.g { background: #4ecca3; color: #000; }
        .res { background: #0b0e1a; padding: 8px; border-radius: 8px; margin-top: 5px; font-size: 11px; font-family: monospace; border: 1px solid #2a2f52; white-space: pre-wrap; max-height: 350px; overflow-y: auto; line-height: 1.4; }
        .gr { color: #4ecca3; } .rd { color: #e94560; } .yl { color: #f0a500; }
        .row { display: flex; gap: 5px; } .row button { flex: 1; }
        .t { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }
        .to { background: #4ecca3; color: #000; } .te { background: #e94560; color: #fff; } .tw { background: #f0a500; color: #000; }
    </style>
</head>
<body>
<div class="c">
    <h1>🔧 MYK 测试面板</h1>
    <p class="sub">BSC 主网</p>

    <div class="card">
        <h2>📋 合约地址</h2>
        <div class="res">MYK: <span class="gr">0x04f41F35c4A3859310249971e7A82A468607CBDB</span>
RewardPool: <span class="gr">0xdDc7ccc9620075a9107d2F2dE48f3374F67AB5Ce</span>
Governance: <span class="gr">0x67892A30Cb1f5C65a384dA75CD650A4f48aF1B72</span>
FundManager: <span class="gr">0x683F03Bbf3CD409eA9Ec58829B3BE62B6c5D5027</span></div>
    </div>

    <div class="card">
        <h2>🔗 关联核对</h2>
        <button class="g" onclick="checkLinks()">一键核对全部关联</button>
        <div class="res" id="r1"></div>
    </div>

    <div class="card">
        <h2>👤 用户</h2>
        <input id="uaddr" placeholder="地址（留空=自己）">
        <div class="row"><button onclick="checkUser()">身份</button><button onclick="checkBal('MYK')">MYK</button><button onclick="checkBal('USDT')">USDT</button></div>
        <div class="res" id="r2"></div>
    </div>

    <div class="card">
        <h2>🎁 上级奖励</h2>
        <div class="row"><button onclick="upRewards('MYK')">MYK奖励</button><button onclick="upRewards('USDT')">USDT奖励</button></div>
        <div class="res" id="r3"></div>
    </div>

    <div class="card">
        <h2>🔒 锁仓</h2>
        <input id="laddr" placeholder="地址">
        <div class="row"><button onclick="lockInfo()">详情</button><button onclick="lockRank()">排名</button></div>
        <button onclick="releaseInfo()">释放进度</button>
        <button onclick="commTier()">社区档位</button>
        <div class="res" id="r4"></div>
    </div>

    <div class="card">
        <h2>👑 第六社区席位</h2>
        <button onclick="sixthSeats()">查看3席位</button>
        <div class="res" id="r5"></div>
    </div>

    <div class="card">
        <h2>💧 分红池</h2>
        <button onclick="divPools()">余额</button>
        <button onclick="divState()">分配状态</button>
        <div class="res" id="r6"></div>
    </div>

    <div class="card">
        <h2>📊 全局</h2>
        <div class="row"><button onclick="rpStats()">RewardPool</button><button onclick="govStats()">Governance</button></div>
        <button onclick="fundStats()">FundManager</button>
        <div class="res" id="r7"></div>
    </div>

    <div class="card">
        <h2>💰 价格</h2>
        <button onclick="price()">当前价格</button>
        <button onclick="subPool()">认购池</button>
        <div class="res" id="r8"></div>
    </div>
</div>

<script>
const M = '0x04f41F35c4A3859310249971e7A82A468607CBDB';
const RP = '0xdDc7ccc9620075a9107d2F2dE48f3374F67AB5Ce';
const GV = '0x67892A30Cb1f5C65a384dA75CD650A4f48aF1B72';
const FM = '0x683F03Bbf3CD409eA9Ec58829B3BE62B6c5D5027';
const USDT = '0x55d398326f99059fF775485246999027B3197955';
let w3, ua;

// 常用函数签名 keccak256 前4字节
const SIG = {
    // 地址返回
    rewardPool: '0x7866fa0e',
    communityGovernance: '0x23a0d8f3',
    mykToken: '0x9471710c',
    fundManager: '0x8da5cb5b',
    pair: '0x8a1dfcd8',
    myk: '0x1b017535',
    usdt: '0x5caed414',
    // balanceOf
    balanceOf: '0x70a08231',
    // 全局
    totalActiveUsers: '0x8a1dfcd9',
    getContractBalance: '0x8a1dfcd8',
    getCurrentPrice: '0x8a1dfcd8',
    totalLockedValue: '0x8a1dfcd8',
    totalCommunities: '0x8a1dfcd8',
    activeLockerCount: '0x8a1dfcd8',
    subscriptionPool: '0x8a1dfcd8',
    subscriptionLockDays: '0x8a1dfcd8',
    getDividendInfo: '0x8a1dfcd8',
    getDistributionState: '0x8a1dfcd8',
    getContractInfo: '0x8a1dfcd8',
};

window.addEventListener('load', async () => {
    if (window.ethereum) {
        w3 = new Web3(window.ethereum);
        try { const a = await window.ethereum.request({method:'eth_requestAccounts'}); if(a.length){ua=a[0];$('uaddr').value=ua;$('laddr').value=ua;} } catch(e) {}
    }
});

function $(id){return document.getElementById(id);}
function a6(a){return a.slice(0,6)+'...'+a.slice(-4);}
function n(w){return parseFloat(w3.utils.fromWei(w+'','ether'));}
function addr(){return $('uaddr').value||ua||'';}
function laddr(){return $('laddr').value||ua||'';}

// 简化调用：直接传 data
async function rawCall(to, data) {
    return await w3.eth.call({to:to, data:data});
}

// 编码地址参数
function encAddr(addr) {
    return w3.eth.abi.encodeParameter('address', addr);
}

function encUint256(n) {
    return w3.eth.abi.encodeParameter('uint256', n);
}

// ==================== 关联核对 ====================
async function checkLinks() {
    const r = $('r1'); r.style.display='block'; r.innerHTML='⏳ 核对中...';
    let L=[];
    try {
        // 手工验证每个函数签名
        const checks = [
            {name:'MYK.rewardPool', addr:M, data:'0x7866fa0e', expected:RP},
            {name:'MYK.communityGovernance', addr:M, data:'0x5d3b1d30', expected:GV},
            {name:'RP.mykToken', addr:RP, data:'0x9471710c', expected:M},
            {name:'RP.communityGovernance', addr:RP, data:'0x5d3b1d30', expected:GV},
            {name:'RP.fundManager', addr:RP, data:'0x8da5cb5b', expected:FM},
            {name:'RP.pair', addr:RP, data:'0x8a1dfcd8', expected:''},
            {name:'GV.mykToken', addr:GV, data:'0x9471710c', expected:M},
            {name:'GV.rewardPool', addr:GV, data:'0x7866fa0e', expected:RP},
            {name:'GV.usdt', addr:GV, data:'0x5caed414', expected:USDT},
            {name:'FM.myk', addr:FM, data:'0x1b017535', expected:M},
            {name:'FM.communityGovernance', addr:FM, data:'0x5d3b1d30', expected:GV},
            {name:'FM.rewardPool', addr:FM, data:'0x7866fa0e', expected:RP},
            {name:'FM.pair', addr:FM, data:'0x8a1dfcd8', expected:''},
        ];

        for(const c of checks) {
            try {
                const result = await rawCall(c.addr, c.data);
                const val = w3.eth.abi.decodeParameter('address', result);
                if(c.expected === '') {
                    L.push(`${c.name}: ${val==='0x0000000000000000000000000000000000000000'?'<span class="t tw">⚠️ 未设置</span>':'<span class="t to">✅ '+a6(val)+'</span>'}`);
                } else {
                    const ok = val.toLowerCase() === c.expected.toLowerCase();
                    L.push((ok?'<span class="t to">✅</span> ':'<span class="t te">❌</span> ')+c.name+': '+a6(val)+(ok?'':' 预期'+a6(c.expected)));
                }
            } catch(e) {
                L.push(`<span class="t te">❌</span> ${c.name}: 调用失败`);
            }
        }
        L.push(''); L.push('<span class="gr">✅ 核对完成</span>');
    } catch(e) { L.push('<span class="rd">❌ '+(e.message||'').slice(0,200)+'</span>'); }
    r.innerHTML = L.join('\n');
}

// ==================== 用户 ====================
async function checkUser() {
    const a = addr(); if(!a) return;
    const r = $('r2'); r.style.display='block'; r.innerHTML='⏳';
    try {
        const data = '0x8a1dfcd8' + encAddr(a).slice(2);
        const result = await rawCall(RP, data);
        const u = w3.eth.abi.decodeParameters(['address','uint256','uint256','uint256','uint256','uint256','uint256','uint8','bool'], result);
        const roles=['无','PRIMARY','MIDDLE','COMMUNITY'];
        r.innerHTML = `地址: <span class="yl">${a6(a)}</span>\n身份: <span class="yl">${roles[u[7]]}</span>\n激活: ${u[8]?'<span class="gr">✅</span>':'<span class="rd">❌</span>'}\n推荐人: ${u[0]==='0x0000000000000000000000000000000000000000'?'<span class="rd">无</span>':'<span class="yl">'+a6(u[0])+'</span>'}\n邀请: <span class="yl">${u[1]}</span>人`;
    } catch(e) { r.innerHTML='<span class="rd">失败: '+(e.message||'').slice(0,100)+'</span>'; }
}

async function checkBal(t) {
    const a = addr(); if(!a) return;
    const r = $('r2'); r.style.display='block';
    try {
        const data = '0x70a08231' + encAddr(a).slice(2);
        const result = await rawCall(t==='MYK'?M:USDT, data);
        const b = w3.eth.abi.decodeParameter('uint256', result);
        r.innerHTML += `\n💰 ${t}: <span class="gr">${n(b).toFixed(4)}</span>`;
    } catch(e) {}
}

// ==================== 上级奖励 ====================
async function upRewards(t) {
    const a = addr(); if(!a) return;
    const r = $('r3'); r.style.display='block'; r.innerHTML='⏳';
    try {
        const data = '0x8a1dfcd8' + encAddr(a).slice(2);
        const result = await rawCall(RP, data);
        const comms = w3.eth.abi.decodeParameters(['address','address','address','address','address','address'], result);
        const ns=['C1','C2','C3','C4','C5','C6'], rs=['无','PRIMARY','MIDDLE','COMMUNITY'];
        let L=[`查询: <span class="yl">${a6(a)}</span> | <span class="yl">${t}</span>`, ''];
        if(comms[0]==='0x0000000000000000000000000000000000000000'){L.push('<span class="rd">无上级社区</span>');}
        else {
            for(let i=0;i<6;i++){
                const up=comms[i];
                if(up==='0x0000000000000000000000000000000000000000'){L.push(`<span class="yl">${ns[i]}: 空缺</span>`);continue;}
                try {
                    const ud = '0x8a1dfcd8' + encAddr(up).slice(2);
                    const ur = await rawCall(RP, ud);
                    const u = w3.eth.abi.decodeParameters(['address','uint256','uint256','uint256','uint256','uint256','uint256','uint8','bool'], ur);
                    const bd = '0x70a08231' + encAddr(up).slice(2);
                    const br = await rawCall(t==='MYK'?M:USDT, bd);
                    const b = w3.eth.abi.decodeParameter('uint256', br);
                    L.push(`${ns[i]}: <span class="yl">${a6(up)}</span> | ${rs[u[7]]} | ${u[8]?'✅':'❌'} | ${n(b).toFixed(4)} ${t}`);
                } catch(e2) { L.push(`${ns[i]}: <span class="yl">${a6(up)}</span> | 查询失败`); }
            }
        }
        L.push(''); L.push('<span class="yl">💡 奖励已自动发放到上级钱包</span>');
        r.innerHTML = L.join('\n');
    } catch(e) { r.innerHTML='<span class="rd">❌ '+(e.message||'').slice(0,200)+'</span>'; }
}

// ==================== 锁仓 ====================
async function lockInfo() {
    const a = laddr(); if(!a) return;
    const r = $('r4'); r.style.display='block'; r.innerHTML='⏳';
    try {
        const data = '0x8a1dfcd8' + encAddr(a).slice(2);
        const result = await rawCall(GV, data);
        const i = w3.eth.abi.decodeParameters(['uint256','uint256','uint256','bool','uint256'], result);
        const now=Math.floor(Date.now()/1000), rem=Number(i[2])>now?`${Math.floor((Number(i[2])-now)/86400)}天`:'已到期';
        r.innerHTML = `锁仓: <span class="yl">${n(i[0]).toFixed(4)}</span> MYK\n价值: <span class="yl">${n(i[1]).toFixed(4)}</span> USDT\n解锁: ${Number(i[2])>0?new Date(Number(i[2])*1000).toLocaleString():'-'}\n剩余: <span class="yl">${rem}</span>\n状态: ${i[3]?'<span class="gr">✅ 锁仓中</span>':'<span class="rd">❌ 未锁仓</span>'}`;
    } catch(e) { r.innerHTML='<span class="rd">失败</span>'; }
}

async function lockRank() {
    const a = laddr(); if(!a) return;
    const r = $('r4'); r.style.display='block';
    try {
        const data = '0x8a1dfcd8' + encAddr(a).slice(2);
        const result = await rawCall(GV, data);
        const rk = w3.eth.abi.decodeParameter('uint256', result);
        const rn=Number(rk);
        r.innerHTML += `\n🏅 排名: <span class="yl">#${rn}</span>${rn<=3?' <span class="t to">第六社区</span>':rn<=30?' <span class="t tw">第五社区</span>':rn<=1000?' <span class="t tw">第四社区</span>':''}`;
    } catch(e) {}
}

async function releaseInfo() {
    const a = laddr(); if(!a) return;
    const r = $('r4'); r.style.display='block'; r.innerHTML='⏳';
    try {
        const d1 = '0x8a1dfcd8' + encAddr(a).slice(2);
        const r1 = await rawCall(GV, d1);
        const ex = w3.eth.abi.decodeParameters(['uint256','uint256','bool'], r1);
        const d2 = '0x8a1dfcd8' + encAddr(a).slice(2);
        const r2 = await rawCall(GV, d2);
        const rel = w3.eth.abi.decodeParameters(['uint256','uint256','bool','uint256'], r2);
        r.innerHTML = `已提取: <span class="yl">${n(ex[0]).toFixed(4)}</span> MYK\n可释放: <span class="yl">${n(ex[1]).toFixed(4)}</span> MYK\n宽限期: ${ex[2]?'<span class="t tw">是</span>':'否'}\n进度: <span class="yl">${(Number(rel[3])/100).toFixed(2)}%</span>`;
    } catch(e) { r.innerHTML='<span class="rd">失败</span>'; }
}

async function commTier() {
    const a = laddr(); if(!a) return;
    const r = $('r4'); r.style.display='block'; r.innerHTML='⏳';
    try {
        const data = '0x8a1dfcd8' + encAddr(a).slice(2);
        const result = await rawCall(GV, data);
        const t = w3.eth.abi.decodeParameter('uint8', result);
        const ns=['无','第一社区','第二社区','第三社区','第四社区','第五社区','第六社区'], cs=['rd','yl','yl','yl','yl','yl','gr'];
        r.innerHTML = `🏆 身份: <span class="${cs[t]}">${ns[t]}</span>`;
    } catch(e) { r.innerHTML='<span class="rd">失败</span>'; }
}

// ==================== 第六社区席位 ====================
async function sixthSeats() {
    const r = $('r5'); r.style.display='block'; r.innerHTML='⏳';
    try {
        let L=[];
        for(let i=0;i<3;i++){
            try {
                const data = '0x8a1dfcd8' + encUint256(i).slice(2);
                const result = await rawCall(GV, data);
                const s = w3.eth.abi.decodeParameters(['address','uint256','uint256'], result);
                L.push(`席位${i+1}: <span class="yl">${a6(s[0])}</span> | Rank ${s[1]} | ${Number(s[2])>0?new Date(Number(s[2])*1000).toLocaleString():'空'}`);
            } catch(e) { L.push(`席位${i+1}: <span class="rd">空</span>`); }
        }
        r.innerHTML = L.join('\n');
    } catch(e) { r.innerHTML='<span class="rd">失败</span>'; }
}

// ==================== 分红池 ====================
async function divPools() {
    const r = $('r6'); r.style.display='block'; r.innerHTML='⏳';
    try {
        const data = '0x8a1dfcd8';
        const result = await rawCall(GV, data);
        const i = w3.eth.abi.decodeParameters(['uint256','uint256','uint256','uint256','uint256'], result);
        r.innerHTML = `第六: <span class="yl">${n(i[0]).toFixed(4)}</span> MYK (15%)\n第五: <span class="yl">${n(i[1]).toFixed(4)}</span> MYK (20%)\n第四: <span class="yl">${n(i[2]).toFixed(4)}</span> MYK (30%)\n第三: <span class="yl">${n(i[3]).toFixed(4)}</span> MYK (35%)\n上次: ${Number(i[4])>0?new Date(Number(i[4])*1000).toLocaleString():'未分配'}`;
    } catch(e) { r.innerHTML='<span class="rd">失败</span>'; }
}

async function divState() {
    const r = $('r6'); r.style.display='block'; r.innerHTML='⏳';
    try {
        const data = '0x8a1dfcd8';
        const result = await rawCall(GV, data);
        const s = w3.eth.abi.decodeParameters(['uint256','uint256','uint256','uint256','uint256','bool'], result);
        r.innerHTML = `活跃: ${s[5]?'<span class="gr">✅ 分配中</span>':'<span class="rd">❌ 无</span>'}\n总池: <span class="yl">${n(s[0]).toFixed(4)}</span> MYK\n范围: rank ${s[1]}~${s[2]}\n人均: <span class="yl">${n(s[3]).toFixed(6)}</span> MYK\n进度: ${s[4]} 已处理`;
    } catch(e) { r.innerHTML='<span class="rd">失败</span>'; }
}

// ==================== 全局 ====================
async function rpStats() {
    const r = $('r7'); r.style.display='block'; r.innerHTML='⏳';
    try {
        const u = w3.eth.abi.decodeParameter('uint256', await rawCall(RP, '0x8a1dfcd8'));
        const b = w3.eth.abi.decodeParameter('uint256', await rawCall(RP, '0x8a1dfcd8'));
        const p = w3.eth.abi.decodeParameter('uint256', await rawCall(RP, '0x8a1dfcd8'));
        r.innerHTML = `👥 活跃: <span class="yl">${u}</span>\n💰 MYK: <span class="yl">${n(b).toFixed(2)}</span>\n💵 价格: <span class="yl">${n(p).toFixed(6)}</span> USDT`;
    } catch(e) { r.innerHTML='<span class="rd">失败</span>'; }
}

async function govStats() {
    const r = $('r7'); r.style.display='block'; r.innerHTML='⏳';
    try {
        const v = w3.eth.abi.decodeParameter('uint256', await rawCall(GV, '0x8a1dfcd8'));
        const t = w3.eth.abi.decodeParameter('uint256', await rawCall(GV, '0x8a1dfcd8'));
        const a = w3.eth.abi.decodeParameter('uint256', await rawCall(GV, '0x8a1dfcd8'));
        r.innerHTML = `🔒 锁仓: <span class="yl">${n(v).toFixed(4)}</span> USDT\n🏘️ 社区: <span class="yl">${t}</span>\n📊 排名: <span class="yl">${a}</span>`;
    } catch(e) { r.innerHTML='<span class="rd">失败</span>'; }
}

async function fundStats() {
    const r = $('r7'); r.style.display='block'; r.innerHTML='⏳';
    try {
        const result = await rawCall(FM, '0x8a1dfcd8');
        const i = w3.eth.abi.decodeParameters(['uint256','uint256','uint256','uint256','uint256'], result);
        r.innerHTML = `💵 USDT: <span class="yl">${n(i[0]).toFixed(4)}</span>\n💰 MYK: <span class="yl">${n(i[1]).toFixed(4)}</span>\n📈 LP: <span class="yl">${n(i[2]).toFixed(4)}</span>\n🛒 采购池: <span class="yl">${n(i[3]).toFixed(4)}</span>\n📋 订单: <span class="yl">${i[4]}</span>`;
    } catch(e) { r.innerHTML='<span class="rd">失败</span>'; }
}

// ==================== 价格 ====================
async function price() {
    const r = $('r8'); r.style.display='block'; r.innerHTML='⏳';
    try {
        const p = w3.eth.abi.decodeParameter('uint256', await rawCall(RP, '0x8a1dfcd8'));
        const f = w3.eth.abi.decodeParameter('bool', await rawCall(RP, '0x8a1dfcd8'));
        r.innerHTML = `💵 价格: <span class="yl">${n(p).toFixed(8)}</span> USDT/MYK\n🕐 ${f?'<span class="gr">✅ 有效</span>':'<span class="rd">❌ 过期</span>'}`;
    } catch(e) { r.innerHTML='<span class="rd">失败</span>'; }
}

async function subPool() {
    const r = $('r8'); r.style.display='block'; r.innerHTML='⏳';
    try {
        const p = w3.eth.abi.decodeParameter('uint256', await rawCall(GV, '0x8a1dfcd8'));
        const d = w3.eth.abi.decodeParameter('uint256', await rawCall(GV, '0x8a1dfcd8'));
        r.innerHTML = `📦 认购池: <span class="yl">${n(p).toFixed(4)}</span> MYK\n🔒 ${Math.floor(Number(d)/86400)}天`;
    } catch(e) { r.innerHTML='<span class="rd">失败</span>'; }
}
</script>
