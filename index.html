<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>MYK 生态 · 节点面板</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 30% 10%, #1e2a4a, #0b0f1a);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 16px; margin: 0;
    }
    .container { max-width: 500px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }
    .lang-bar { display: flex; justify-content: flex-end; margin-bottom: -8px; }
    .lang-toggle {
      background: rgba(20, 25, 45, 0.8); backdrop-filter: blur(12px);
      padding: 8px 16px; border-radius: 40px; display: flex; align-items: center; gap: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2); cursor: pointer; user-select: none;
      transition: all 0.2s; font-weight: 600; font-size: 14px; color: #f0b90b;
    }
    .lang-toggle:hover { background: rgba(233, 69, 96, 0.25); border-color: #e94560; }
    h1 { font-size: 2rem; font-weight: 700; text-align: center; color: #f7c744; text-shadow: 0 4px 12px rgba(0,0,0,0.6); letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .glass-card {
      background: rgba(18, 22, 40, 0.7); backdrop-filter: blur(16px); border-radius: 28px;
      padding: 20px 18px; border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5); transition: border 0.2s;
    }
    .glass-card:hover { border-color: rgba(233, 69, 96, 0.5); }
    .wallet-row { display: flex; align-items: center; justify-content: space-between; background: #0f1221; border-radius: 20px; padding: 12px 16px; margin-bottom: 5px; }
    .wallet-addr { font-family: 'Fira Code', monospace; color: #4ef0a8; font-weight: 600; font-size: 15px; }
    .btn {
      background: linear-gradient(135deg, #e94560, #b92b4a); border: none; color: white;
      font-weight: 700; padding: 14px 18px; border-radius: 18px; cursor: pointer;
      transition: 0.2s; box-shadow: 0 8px 18px rgba(233, 69, 96, 0.3);
      text-transform: uppercase; letter-spacing: 0.4px; width: 100%; font-size: 15px;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.6; box-shadow: none; transform: none; }
    .btn-outline { background: #2d325a; box-shadow: none; padding: 10px 16px; }
    .btn-sm { padding: 10px 14px; font-size: 13px; width: auto; }
    .btn-green { background: linear-gradient(135deg, #4ecca3, #2e8b6a); box-shadow: 0 8px 18px rgba(78, 204, 163, 0.3); }
    .tab-container { display: flex; background: #0c0f1c; border-radius: 16px; padding: 4px; margin: 12px 0; border: 1px solid #2d3355; }
    .tab { flex: 1; text-align: center; padding: 10px; border-radius: 14px; font-weight: 600; color: #9aa0c0; cursor: pointer; transition: 0.2s; }
    .tab.active { background: #e94560; color: white; }
    .input-field { background: #0d1020; border: 1px solid #394056; border-radius: 16px; padding: 14px 16px; color: white; width: 100%; margin: 10px 0 12px; font-size: 15px; outline: none; transition: 0.2s; }
    .input-field:focus { border-color: #e94560; }
    .badge { background: #cd7f32; color: #000; padding: 2px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-left: 6px; }
    .badge-gold { background: #f7c744; }
    .badge-silver { background: #b0b8c0; }
    .info-box { background: #0a0d16; border-radius: 14px; padding: 12px; margin-top: 12px; font-size: 14px; border-left: 4px solid #e94560; word-break: break-word; color: #ccd6f0; }
    .row-buttons { display: flex; gap: 10px; }
    h2 { font-size: 1.2rem; color: #f0b90b; display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .desc { color: #a3adc9; font-size: 14px; margin-bottom: 8px; }
    .highlight { color: #4ef0a8; font-weight: 700; }
    .footer-note { text-align: center; font-size: 12px; color: #7b85a6; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); }
    .hint-text { color: #f0b90b; font-size: 12px; margin: 4px 0 8px; }
    .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; color: #a3adc9; }
    .price-value { color: #4ef0a8; font-weight: 700; }
    .price-fresh { font-size: 11px; }
  </style>
</head>
<body>
<div class="container">
  <div class="lang-bar">
    <div class="lang-toggle" id="langToggle"><span>🌐</span> <span id="langText">EN</span></div>
  </div>
  <h1>🌐 MYK 生态面板</h1>

  <!-- 钱包区域 -->
  <div class="glass-card" style="padding: 14px;">
    <div class="wallet-row">
      <span style="color:#b0b8d0;">🔗 钱包</span>
      <span class="wallet-addr" id="walletDisplay">未连接</span>
    </div>
    <button class="btn btn-outline" id="connectWalletBtn" style="margin-top: 8px;">🔓 连接钱包</button>
  </div>

  <!-- 价格卡片 -->
  <div class="glass-card">
    <h2>💰 价格</h2>
    <div class="price-row">
      <span>当前: <span class="price-value" id="currentPrice">--</span> USDT/MYK</span>
      <span class="price-fresh" id="priceFresh">--</span>
    </div>
    <div class="row-buttons">
      <button class="btn btn-green btn-sm" id="updatePriceBtn" style="flex:1;">🔄 更新价格</button>
      <button class="btn btn-sm" id="refreshPriceBtn" style="flex:1;">🔍 刷新</button>
    </div>
    <div class="info-box" id="priceResult" style="display:none;"></div>
  </div>

  <!-- 激活卡片 -->
  <div class="glass-card">
    <h2>🥉 激活初级 <span class="badge">PRIMARY</span></h2>
    <div class="tab-container" id="activateTabSwitch">
      <div class="tab active" data-tab="myk">💎 MYK激活</div>
      <div class="tab" data-tab="usdt">💵 USDT激活</div>
    </div>
    <div id="panelMYK">
      <div class="desc">支付 <span class="highlight">2 USDT</span> 等值MYK</div>
      <div class="price-row">
        <span>建议: <span class="price-value" id="suggestedMYK">--</span> MYK</span>
      </div>
      <input class="input-field" id="mykAmount" type="number" placeholder="MYK数量" value="2.2" step="0.1">
      <button class="btn" id="activateMYKBtn">💸 支付MYK激活</button>
      <div class="info-box" id="activateMYKResult" style="display:none;"></div>
    </div>
    <div id="panelUSDT" style="display:none;">
      <div class="desc">支付 <span class="highlight">2 USDT</span></div>
      <div class="hint-text">推荐人由链上绑定关系自动识别</div>
      <input class="input-field" id="usdtRefInput" type="text" placeholder="推荐人地址（可选留空）">
      <button class="btn" id="activateUSDTBtn">💵 支付2 USDT激活</button>
      <div class="info-box" id="activateUSDTResult" style="display:none;"></div>
    </div>
  </div>

  <!-- 认购卡片 -->
  <div class="glass-card">
    <h2>🥈 200U <span class="badge badge-silver">MIDDLE</span></h2>
    <input class="input-field" id="sub200Amount" type="number" placeholder="USDT" value="200" step="1">
    <button class="btn" id="subscribe200Btn">💰 认购200U</button>
    <div class="info-box" id="subscribe200Result" style="display:none;"></div>
  </div>

  <div class="glass-card">
    <h2>🥇 500U <span class="badge badge-gold">第四社区</span></h2>
    <input class="input-field" id="sub500Amount" type="number" placeholder="USDT" value="500" step="1">
    <button class="btn" id="subscribe500Btn">🌟 认购500U</button>
    <div class="info-box" id="subscribe500Result" style="display:none;"></div>
  </div>

  <div class="glass-card">
    <h2>👑 1000U <span class="badge badge-gold">第五社区</span></h2>
    <input class="input-field" id="sub1000Amount" type="number" placeholder="USDT" value="1000" step="1">
    <button class="btn" id="subscribe1000Btn">🔥 认购1000U</button>
    <div class="info-box" id="subscribe1000Result" style="display:none;"></div>
  </div>

  <!-- 查询工具 -->
  <div class="glass-card">
    <h2>🔍 查询</h2>
    <input class="input-field" id="checkAddrInput" type="text" placeholder="地址 (留空=自己)">
    <div class="row-buttons">
      <button class="btn" id="checkStatusBtn" style="flex:1;">📋 身份</button>
      <button class="btn" id="checkBalanceBtn" style="flex:1;">💰 MYK</button>
      <button class="btn" id="checkUSDTBtn" style="flex:1;">💵 USDT</button>
    </div>
    <div class="info-box" id="statusResult" style="display:none;"></div>
  </div>
  <div class="footer-note">✨ MYK 生态操作面板</div>
</div>

<script>
  (function() {
    const MYK = '0x04f41F35c4A3859310249971e7A82A468607CBDB';
    const RP = '0xdDc7ccc9620075a9107d2F2dE48f3374F67AB5Ce';
    const GOV = '0x67892A30Cb1f5C65a384dA75CD650A4f48aF1B72';
    const USDT = '0x55d398326f99059fF775485246999027B3197955';

    let web3, userAddress, currentPrice = '1000000000000000000';

    function $(id) { return document.getElementById(id); }
    function a6(a) { return a.slice(0,6)+'...'+a.slice(-4); }
    function n(w) { return parseFloat(Web3.utils.fromWei(w+'','ether')); }
    function sig(name) { return web3.eth.abi.encodeFunctionSignature(name).slice(2); }

    async function connectWallet() {
      if (!window.ethereum) { alert('请安装MetaMask'); return; }
      const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
      web3 = new Web3(window.ethereum);
      userAddress = accs[0];
      $('walletDisplay').textContent = a6(userAddress);
      $('walletDisplay').style.color = '#4ef0a8';
      $('checkAddrInput').value = userAddress;
      fetchPrice();
    }

    // ====== 价格功能 ======
    async function fetchPrice() {
      try {
        if (!web3) return;
        const data = await web3.eth.call({to:RP, data:'0x'+sig('getCurrentPrice()')});
        currentPrice = web3.eth.abi.decodeParameter('uint256', data);
        const pn = n(currentPrice);
        $('currentPrice').textContent = pn.toFixed(6);
        $('suggestedMYK').textContent = (2 / pn * 1.1).toFixed(4);
        $('mykAmount').value = (2 / pn * 1.1).toFixed(4);

        // 检查价格是否有效
        try {
          const freshData = await web3.eth.call({to:RP, data:'0x'+sig('isPriceFresh()')});
          const fresh = web3.eth.abi.decodeParameter('bool', freshData);
          $('priceFresh').textContent = fresh ? '✅ 有效' : '⚠️ 过期';
          $('priceFresh').style.color = fresh ? '#4ecca3' : '#f0a500';
        } catch(e) { $('priceFresh').textContent = ''; }
      } catch(e) {
        $('currentPrice').textContent = '1.000000';
        $('suggestedMYK').textContent = '2.2';
        $('mykAmount').value = '2.2';
      }
    }

    async function updatePrice() {
      if (!userAddress) { alert('请先连接钱包'); return; }
      const btn = $('updatePriceBtn');
      const el = $('priceResult');
      el.style.display = 'block'; el.innerHTML = '⏳ 更新价格中...';
      btn.disabled = true;
      try {
        const data = '0x' + sig('updatePrice()');
        await window.ethereum.request({method:'eth_sendTransaction', params:[{from:userAddress, to:RP, data:data}]});
        el.innerHTML = '✅ 价格更新成功！';
        setTimeout(fetchPrice, 3000); // 等3秒后刷新价格
      } catch(e) {
        const msg = e.message || '';
        if (msg.includes('too frequent')) {
          el.innerHTML = '⚠️ 更新太频繁，请等5分钟后再试';
        } else if (msg.includes('time too short')) {
          el.innerHTML = '⚠️ TWAP时间窗口不足，请等5分钟后重试';
        } else {
          el.innerHTML = '❌ ' + msg.slice(0, 150);
        }
      }
      finally { btn.disabled = false; }
    }

    // ====== 查询 ======
    async function checkStatus() {
      const target = $('checkAddrInput').value.trim() || userAddress;
      if (!target || !web3) { alert('请连接钱包或输入地址'); return; }
      const el = $('statusResult'); el.style.display = 'block'; el.innerHTML = '⏳';
      try {
        const encodedAddr = web3.eth.abi.encodeParameter('address', target).slice(2);
        const data = '0x' + sig('users(address)') + encodedAddr;
        const result = await web3.eth.call({to:RP, data:data});
        const u = web3.eth.abi.decodeParameters(['address','uint256','uint256','uint256','uint256','uint256','uint256','uint8','bool'], result);
        const roles = ['无','PRIMARY','MIDDLE','COMMUNITY'];
        const date = u[4] > 0 ? new Date(Number(u[4])*1000).toLocaleDateString() : '未激活';
        el.innerHTML = `身份: ${roles[u[7]]} | 激活: ${u[8]?'✅':'❌'} | 推荐人: ${a6(u[0])} | 邀请: ${u[1]}人 | 激活日: ${date}`;
      } catch(e) { el.innerHTML = '❌ 查询失败: '+(e.message||'').slice(0,100); }
    }

    async function checkBalance(token) {
      if (!userAddress) return;
      const el = $('statusResult'); el.style.display = 'block';
      try {
        const encodedAddr = web3.eth.abi.encodeParameter('address', userAddress).slice(2);
        const data = '0x' + sig('balanceOf(address)') + encodedAddr;
        const addr = token === 'MYK' ? MYK : USDT;
        const result = await web3.eth.call({to:addr, data:data});
        const bal = web3.eth.abi.decodeParameter('uint256', result);
        el.innerHTML += `\n${token}: ${n(bal).toFixed(4)}`;
      } catch(e) {}
    }

    // ====== 激活 MYK ======
    async function activateMYK() {
      if (!userAddress) return;
      const btn = $('activateMYKBtn');
      const amount = $('mykAmount').value;
      btn.disabled = true; btn.textContent = '处理中...';
      try {
        const mykWei = Web3.utils.toWei(amount, 'ether');
        const data = '0x' + sig('transfer(address,uint256)') + web3.eth.abi.encodeParameters(['address','uint256'], [RP, mykWei]).slice(2);
        await window.ethereum.request({method:'eth_sendTransaction', params:[{from:userAddress, to:MYK, data:data}]});
        $('activateMYKResult').style.display = 'block';
        $('activateMYKResult').innerHTML = '✅ 激活成功！';
      } catch(e) { $('activateMYKResult').style.display = 'block'; $('activateMYKResult').innerHTML = '❌ '+(e.message||'').slice(0,100); }
      finally { btn.disabled = false; btn.textContent = '💸 支付MYK激活'; }
    }

    // ====== 激活 USDT ======
    async function activateUSDT() {
      if (!userAddress) return;
      const btn = $('activateUSDTBtn');
      const el = $('activateUSDTResult');
      el.style.display = 'block'; el.innerHTML = '⏳ 授权USDT...';
      btn.disabled = true;
      try {
        const fee = web3.utils.toWei('2', 'ether');
        const appData = '0x' + sig('approve(address,uint256)') + web3.eth.abi.encodeParameters(['address','uint256'], [RP, fee]).slice(2);
        await window.ethereum.request({method:'eth_sendTransaction', params:[{from:userAddress, to:USDT, data:appData}]});
        el.innerHTML = '⏳ 激活中...';
        const ref = $('usdtRefInput').value.trim() || '0x0000000000000000000000000000000000000000';
        const actData = '0x' + sig('activateWithUSDT(address)') + web3.eth.abi.encodeParameter('address', ref).slice(2);
        await window.ethereum.request({method:'eth_sendTransaction', params:[{from:userAddress, to:RP, data:actData}]});
        el.innerHTML = '✅ 激活成功！';
      } catch(e) { el.innerHTML = '❌ '+(e.message||'').slice(0,150); }
      finally { btn.disabled = false; }
    }

    // ====== 认购 ======
    async function subscribe(amount, btnId, resultId) {
      if (!userAddress) return;
      const btn = $(btnId);
      const el = $(resultId);
      btn.disabled = true;
      const wei = web3.utils.toWei(String(amount), 'ether');
      try {
        btn.textContent = '授权...';
        el.style.display = 'block'; el.innerHTML = '⏳ 授权USDT...';
        const appData = '0x' + sig('approve(address,uint256)') + web3.eth.abi.encodeParameters(['address','uint256'], [GOV, wei]).slice(2);
        await window.ethereum.request({method:'eth_sendTransaction', params:[{from:userAddress, to:USDT, data:appData}]});

        btn.textContent = '存入...';
        el.innerHTML = '⏳ 存入USDT...';
        const depData = '0x' + sig('depositUSDT(uint256)') + web3.eth.abi.encodeParameter('uint256', wei).slice(2);
        await window.ethereum.request({method:'eth_sendTransaction', params:[{from:userAddress, to:GOV, data:depData}]});

        btn.textContent = '认购...';
        el.innerHTML = '⏳ 认购MYK...';
        const subData = '0x' + sig('subscribeMYK(uint256)') + web3.eth.abi.encodeParameter('uint256', wei).slice(2);
        await window.ethereum.request({method:'eth_sendTransaction', params:[{from:userAddress, to:GOV, data:subData}]});
        el.innerHTML = '✅ 认购成功！';
      } catch(e) { el.innerHTML = '❌ '+(e.message||'').slice(0,150); }
      finally { btn.disabled = false; btn.textContent = amount >= 1000 ? '🔥 认购1000U' : amount >= 500 ? '🌟 认购500U' : '💰 认购200U'; }
    }

    // ====== Tab 切换 ======
    document.querySelectorAll('#activateTabSwitch .tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('#activateTabSwitch .tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const t = this.dataset.tab;
        $('panelMYK').style.display = t === 'myk' ? 'block' : 'none';
        $('panelUSDT').style.display = t === 'usdt' ? 'block' : 'none';
      });
    });

    // ====== 初始化 ======
    window.addEventListener('load', async () => {
      if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        try {
          const a = await window.ethereum.request({method:'eth_accounts'});
          if(a.length){ userAddress=a[0]; $('walletDisplay').textContent=a6(userAddress); $('walletDisplay').style.color='#4ef0a8'; $('checkAddrInput').value=userAddress; fetchPrice(); }
        } catch(e) {}
      }
      $('connectWalletBtn').addEventListener('click', connectWallet);
      $('updatePriceBtn').addEventListener('click', updatePrice);
      $('refreshPriceBtn').addEventListener('click', fetchPrice);
      $('activateMYKBtn').addEventListener('click', activateMYK);
      $('activateUSDTBtn').addEventListener('click', activateUSDT);
      $('subscribe200Btn').addEventListener('click', ()=>subscribe(200,'subscribe200Btn','subscribe200Result'));
      $('subscribe500Btn').addEventListener('click', ()=>subscribe(500,'subscribe500Btn','subscribe500Result'));
      $('subscribe1000Btn').addEventListener('click', ()=>subscribe(1000,'subscribe1000Btn','subscribe1000Result'));
      $('checkStatusBtn').addEventListener('click', checkStatus);
      $('checkBalanceBtn').addEventListener('click', ()=>checkBalance('MYK'));
      $('checkUSDTBtn').addEventListener('click', ()=>checkBalance('USDT'));
    });
  })();
</script>
</body>
</html>
